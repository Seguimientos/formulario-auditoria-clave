<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Formulario de Auditoría Clave</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background:#ffffff;
      margin:0; 
      max-width:100%; 
    }
    .header { 
      text-align: center; 
      margin-bottom: 0px;
      padding: 15px 0; 
    }
    .logo { 
      max-width: 200px; 
      height: auto; 
      margin-bottom: 2px; 
    }
    .container { 
      max-width:900px; 
      margin:10px auto; 
      background:#f5f5f5; 
      padding:25px; 
      border-radius:12px; 
      box-shadow:0 2px 6px rgba(0,0,0,0.1); 
    }
    h1 { 
      margin-top:0; 
      margin-bottom: 5px; 
      color:#005f66; 
    }
    label { 
      display:block; 
      margin-top:12px; 
      font-weight:bold; 
      color: #005f66; 
    }
    input { 
      width:100%; 
      padding:12px 15px; 
      margin-top:5px; 
      box-sizing:border-box; 
      border: 2px solid #00727a; /* 🔥 AZUL DEL BOTÓN Y LETRA */
      border-radius: 12px; 
    }
    input:focus {
      outline: none;
      border-color: #005f66; 
      box-shadow: 0 0 0 3px rgba(0,114,122,0.1);
    }
    button { 
      width: 100%;
      margin-top:20px; 
      padding:12px 15px; 
      background:#00727a; /* 🔥 AZUL BOTÓN */
      color:white; 
      border:none; 
      border-radius: 12px; 
      cursor:pointer; 
      font-size:16px; 
      font-weight: bold; 
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box; 
    }
    button:disabled { 
      background:#999; 
      cursor:not-allowed; 
    }
    .fila { 
      display:flex; 
      gap:20px; 
    }
    .fila > div { 
      flex:1; 
    }
    .mensaje { 
      margin-top:15px; 
      font-size:14px; 
      padding:10px; 
      border-radius:8px; 
    }
    .exito { 
      background:#d4edda; 
      color:#155724; 
    }
    .error { 
      background:#f8d7da; 
      color:#721c24; 
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="logoclave.png" alt="Logo Clave Capital" class="logo">
    <h1>Formulario de Auditoría</h1>
  </div>

  <div class="container">
    <form id="auditoriaForm">
      <label>Correo empresa:</label>
      <input type="email" name="Correo empresa" required />

      <label>Empresa auditora:</label>
      <input type="text" name="Empresa auditora" required />

      <label>Nombre auditor:</label>
      <input type="text" name="Nombre auditor" required />

      <label>Correo auditor:</label>
      <input type="email" name="Correo auditor" required />

      <div class="fila">
        <div>
          <label>Fecha inicio auditoría:</label>
          <input type="date" name="Fecha inicio auditoría" required />
        </div>
        <div>
          <label>Fecha estimada de informe:</label>
          <input type="date" name="Fecha estimada de informe" required />
        </div>
      </div>

      <button type="submit" id="btnEnviar">Enviar</button>
      <div class="mensaje" id="mensaje"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById("auditoriaForm");
    const btn = document.getElementById("btnEnviar");
    const msg = document.getElementById("mensaje");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      btn.disabled = true;
      msg.className = "mensaje";
      msg.textContent = "Enviando...";

      const data = {
        "Correo empresa": form.querySelector('[name="Correo empresa"]').value,
        "Empresa auditora": form.querySelector('[name="Empresa auditora"]').value,
        "Nombre auditor": form.querySelector('[name="Nombre auditor"]').value,
        "Correo auditor": form.querySelector('[name="Correo auditor"]').value,
        "Fecha inicio auditoría": form.querySelector('[name="Fecha inicio auditoría"]').value,
        "Fecha estimada de informe": form.querySelector('[name="Fecha estimada de informe"]').value
      };

      try {
        const resp = await fetch("https://default7042d393b8c4451aa8f811f6aed5da.85.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/3260704b65884a30af1b8d8602a0db7a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=E6VyfXl22cZQJLQWaPm-GyKot4Q-LwKq0g5zxxrqbfk", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (resp.ok) {
          msg.textContent = "✅ Formulario enviado correctamente. Te contactaremos pronto.";
          msg.className = "mensaje exito";
          form.reset();
        } else {
          msg.textContent = "❌ Error al enviar (código " + resp.status + "). Inténtalo de nuevo.";
          msg.className = "mensaje error";
        }
      } catch (err) {
        msg.textContent = "❌ Error de conexión. Verifica tu internet e inténtalo de nuevo.";
        msg.className = "mensaje error";
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>

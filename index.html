<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Formulario de Auditoría Clave</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background:#ffffff;
      margin:0; 
      max-width:100%; 
    }
    .header { 
      text-align: center; 
      margin-bottom: 0px; /* 🔥 CERO ESPACIO */
      padding: 15px 0; /* 🔥 PADDING REDUCIDO */
    }
    .logo { 
      max-width: 200px; 
      height: auto; 
      margin-bottom: 2px; /* 🔥 MUY POCO */
    }
    .container { 
      max-width:900px; 
      margin:10px auto; /* 🔥 MUY POCO ARRIBA */
      background:#f5f5f5; 
      padding:25px; /* 🔥 PADDING REDUCIDO */
      border-radius:12px; 
      box-shadow:0 2px 6px rgba(0,0,0,0.1); 
    }
    h1 { 
      margin-top:0; 
      margin-bottom: 5px; /* 🔥 MUY POCO */
      color:#005f66; 
    }
    label { 
      display:block; 
      margin-top:12px; /* 🔥 MENOS */
      font-weight:bold; 
      color: #005f66; 
    }
    input { 
      width:100%; 
      padding:12px 15px; 
      margin-top:5px; 
      box-sizing:border-box; 
      border: 2px solid #26A69A; 
      border-radius: 12px; 
    }
    input:focus {
      outline: none;
      border-color: #00727a; 
      box-shadow: 0 0 0 3px rgba(38,166,154,0.1);
    }
    button { 
      margin-top:20px; /* 🔥 MENOS */
      padding:12px 30px; 
      background:#00727a; 
      color:white; 
      border:none; 
      border-radius: 12px; 
      cursor:pointer; 
      font-size:16px; 
    }
    button:disabled { 
      background:#999; 
      cursor:not-allowed; 
    }
    .fila { 
      display:flex; 
      gap:20px; 
    }
    .fila > div { 
      flex:1; 
    }
    .mensaje { 
      margin-top:15px; 
      font-size:14px; 
      padding:10px; 
      border-radius:8px; 
    }
    .exito { 
      background:#d4edda; 
      color:#155724; 
    }
    .error { 
      background:#f8d7da; 
      color:#721c24; 
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="logoclave.png" alt="Logo Clave Capital" class="logo">
    <h1>Formulario de Auditoría</h1>
  </div>

  <div class="container">
    <form id="auditoriaForm">
      <label>Correo:</label>
      <input type="email" name="Correo" required />

      <label>Nombre empresa auditora:</label>
      <input type="text" name="Nombre empresa auditora" required />

      <label>Nombre responsable auditoría:</label>
      <input type="text" name="Nombre responsable auditoría" required />

      <label>Mail auditor responsable:</label>
      <input type="email" name="Mail auditor responsable" required />

      <div class="fila">
        <div>
          <label>Fecha inicio auditoría:</label>
          <input type="date" name="Fecha inicio auditoría" required />
        </div>
        <div>
          <label>Fecha estimada informe auditoría:</label>
          <input type="date" name="Fecha estimada informe auditoría" required />
        </div>
      </div>

      <button type="submit" id="btnEnviar">Enviar</button>
      <div class="mensaje" id="mensaje"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById("auditoriaForm");
    const btn = document.getElementById("btnEnviar");
    const msg = document.getElementById("mensaje");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      btn.disabled = true;
      msg.className = "mensaje";
      msg.textContent = "Enviando...";

      const data = {
        "Correo": form.querySelector('[name="Correo"]').value,
        "Nombre empresa auditora": form.querySelector('[name="Nombre empresa auditora"]').value,
        "Nombre responsable auditoría": form.querySelector('[name="Nombre responsable auditoría"]').value,
        "Mail auditor responsable": form.querySelector('[name="Mail auditor responsable"]').value,
        "Fecha inicio auditoría": form.querySelector('[name="Fecha inicio auditoría"]').value,
        "Fecha estimada informe auditoría": form.querySelector('[name="Fecha estimada informe auditoría"]').value
      };

      try {
        const resp = await fetch("https://default7042d393b8c4451aa8f811f6aed5da.85.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/3260704b65884a30af1b8d8602a0db7a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=E6VyfXl22cZQJLQWaPm-GyKot4Q-LwKq0g5zxxrqbfk", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (resp.ok) {
          msg.textContent = "✅ Formulario enviado correctamente. Te contactaremos pronto.";
          msg.className = "mensaje exito";
          form.reset();
        } else {
          msg.textContent = "❌ Error al enviar (código " + resp.status + "). Inténtalo de nuevo.";
          msg.className = "mensaje error";
        }
      } catch (err) {
        msg.textContent = "❌ Error de conexión. Verifica tu internet e inténtalo de nuevo.";
        msg.className = "mensaje error";
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
